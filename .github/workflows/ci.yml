name: CI

on:
  push:
    branches: [main, release/*, devin/*]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  rust-check:
    name: Rust — Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check (native)
        run: cargo check --workspace

      - name: Test
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Format check
        run: cargo fmt --all -- --check

  rust-build-windows:
    name: Rust — Build Windows x64
    runs-on: ubuntu-latest
    needs: rust-check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install MinGW
        run: sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-win-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-win-

      - name: Build vault-db-tool (Windows)
        run: cargo build --release --target x86_64-pc-windows-gnu -p vault-db-tool

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vault-db-tool-windows
          path: target/x86_64-pc-windows-gnu/release/vault-db-tool.exe

  dotnet-build:
    name: .NET — Build Windows Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore packages
        run: dotnet restore windows-service/SovereignKernelService.csproj

      - name: Build
        run: dotnet build windows-service/SovereignKernelService.csproj -c Release --no-restore

      - name: Publish (self-contained single-file)
        run: dotnet publish windows-service/SovereignKernelService.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-service
          path: ./publish/SovereignKernelVault.exe

  electron-build:
    name: Electron — Build UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron-ui/package-lock.json

      - name: Install dependencies
        run: cd electron-ui && npm ci

      - name: Build main process
        run: cd electron-ui && npx tsc -p tsconfig.main.json

      - name: Build renderer
        run: cd electron-ui && npx vite build

      - name: Install Wine (for Windows packaging)
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y -qq wine64

      - name: Package for Windows
        run: cd electron-ui && CSC_IDENTITY_AUTO_DISCOVERY=false npx electron-builder --win --dir
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: electron-ui-windows
          path: electron-ui/release/win-unpacked/

  package-release:
    name: Package Release Bundle
    runs-on: ubuntu-latest
    needs: [rust-build-windows, dotnet-build, electron-build]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Assemble release package
        run: |
          mkdir -p release-pkg/bin release-pkg/SovereignKernel-UI release-pkg/scripts
          cp artifacts/vault-db-tool-windows/vault-db-tool.exe release-pkg/bin/
          cp artifacts/windows-service/SovereignKernelVault.exe release-pkg/bin/
          cp -r artifacts/electron-ui-windows/* release-pkg/SovereignKernel-UI/
          cp scripts/Install-SovereignKernel.ps1 release-pkg/scripts/
          cd release-pkg && zip -r ../SovereignKernel-${{ github.ref_name }}.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: SovereignKernel-${{ github.ref_name }}.zip
          generate_release_notes: true
